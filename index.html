<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Stellar Vortex</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: #07050d;
    overflow: hidden;
  }
  canvas#stage {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 80vh;
    display: block;
    touch-action: none;
  }

  /* nav */
  .topnav {
    position: fixed;
    top: 16px;
    left: 24px;
    right: 24px;
    margin: 0 auto;
    z-index: 10;
    width: calc(100% - 48px);
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px;
    background: rgba(208, 203, 182, 0.7);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 999px;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: 5px;
    font-family: "Geist", sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #000;
    white-space: nowrap;
  }

  .nav-links {
    display: flex;
    gap: 28px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .nav-links a {
    font-family: "Geist", sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #5B4425;
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: #000; }

  .nav-cta {
    font-family: "Geist", sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    padding: 9px 22px;
    border-radius: 999px;
    white-space: nowrap;
    background: #5B4425;
    color: #F4DEA9;
    transition: opacity 0.2s;
  }
  .nav-cta:hover { opacity: 0.8; }

  /* hamburger */
  .nav-burger {
    display: none;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
  }
  .nav-burger span {
    display: block;
    width: 20px;
    height: 2px;
    background: #000;
    border-radius: 2px;
    transition: transform 0.3s, opacity 0.3s;
  }
  .nav-burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-burger.open span:nth-child(2) { opacity: 0; }
  .nav-burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* mobile dropdown */
  .nav-mobile-menu {
    display: none;
    position: fixed;
    top: 72px;
    left: 24px;
    right: 24px;
    margin: 0 auto;
    width: calc(100% - 48px);
    max-width: 900px;
    background: rgba(208, 203, 182, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 16px 24px;
    flex-direction: column;
    gap: 16px;
    z-index: 9;
  }
  .nav-mobile-menu.open { display: flex; }
  .nav-mobile-menu a {
    font-family: "Geist", sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #5B4425;
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-mobile-menu a:hover { color: #000; }

  @media (max-width: 700px) {
    .nav-links, .nav-cta { display: none; }
    .nav-burger { display: flex; }
  }

  /* hero blur — 80 % of viewport height */
  .bg-blur {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 80vh;
    z-index: 1;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    pointer-events: none;
  }

  /* hero card — 80 % of viewport height */
  .card {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 80vh;
    z-index: 2;
    background: radial-gradient(ellipse at center,
      rgba(255, 255, 255, 0.65) 0%,
      rgba(255, 255, 255, 0.0) 100%
    );
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
  }

  .card h1 {
    margin: 0;
    color: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 39px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  .card .subhead {
    margin: 0;
    color: rgba(0, 0, 0, 0.65);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 15px;
    font-weight: 600;
    line-height: 1.6;
    /* max-width set dynamically to match h1 pixel width */
  }

  .cta-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
  }

  .cta-row button {
    font-family: "Geist", sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    padding: 9px 22px;
    border-radius: 999px;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .cta-row button:hover { opacity: 0.8; }

  .cta-primary  { background: #5B4425; color: #F4DEA9; }
  .cta-secondary { background: #F4DEA9; color: #5B4425; }

  .calm-down {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0px;
    cursor: pointer;
    color: #5B4425;
    opacity: 0.3;
    transition: opacity 0.4s;
    user-select: none;
    border: none;
    background: none;
    padding: 0;
  }

  .calm-down-text {
    font-family: "Geist", sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    white-space: nowrap;
  }
</style>
</head>
<body>

<canvas id="stage" aria-label="Stellar vortex background"></canvas>
<div class="bg-blur"></div>

<nav class="topnav">
  <span class="nav-logo">
    <img src="/at_logo_svg.svg" width="28" height="28" alt="" />
    ALPHA TRACK
  </span>
  <div class="nav-links">
    <a href="#">Solution</a>
    <a href="#">Our DB</a>
    <a href="#">For Influencers</a>
    <a href="#">Docs</a>
  </div>
  <button class="nav-cta">Start Bot</button>
  <button class="nav-burger" id="nav-burger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="nav-mobile-menu" id="nav-mobile-menu">
  <a href="#">Solution</a>
  <a href="#">Our DB</a>
  <a href="#">For Influencers</a>
  <a href="#">Docs</a>
</div>

<div class="card">
  <h1 id="headline">Crypto is a mess.<br><span style="color:#5B4425">Use a correct lens.</span></h1>
  <p class="subhead" id="subhead">AI reads thousands of crypto channels so you don't have to.</p>
  <div class="cta-row">
    <button class="cta-primary">Start for Free</button>
    <button class="cta-secondary">Follow Updates</button>
  </div>

  <button class="calm-down" id="calm-down">
    <img src="/hero_lion.png" height="48" alt="lion" />
    <span class="calm-down-text">CLICK TO CALM DOWN</span>
  </button>
</div>

<script>
  const h1 = document.getElementById('headline');
  const sub = document.getElementById('subhead');
  const ro = new ResizeObserver(() => {
    sub.style.maxWidth = h1.offsetWidth + 'px';
  });
  ro.observe(h1);

  const burger = document.getElementById('nav-burger');
  const mobileMenu = document.getElementById('nav-mobile-menu');
  burger.addEventListener('click', () => {
    burger.classList.toggle('open');
    mobileMenu.classList.toggle('open');
  });

  const calmDown = document.getElementById('calm-down');
  let calmTimer;
  calmDown.addEventListener('click', () => {
    calmDown.style.opacity = '0.55';
    clearTimeout(calmTimer);
    calmTimer = setTimeout(() => { calmDown.style.opacity = '0.3'; }, 3000);
  });
</script>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
